name: build

# Two ways to build all three OSes:
#   • Actions tab → "build" → Run workflow → (optionally) type your default URL.
#   • Push a tag like v0.1.0  →  builds + attaches installers to a draft release.
on:
  workflow_dispatch:
    inputs:
      default_url:
        description: 'Default URL to bake into the launcher (optional, e.g. https://admin.mystore.com)'
        required: false
        default: ''
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — one universal .app/.dmg for Apple Silicon + Intel.
          - platform: macos-latest
            target: universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          # Linux — produces .deb and .AppImage (and .rpm).
          - platform: ubuntu-22.04
            target: ''
            rust-targets: ''
          # Windows — produces .msi and the NSIS .exe setup.
          - platform: windows-latest
            target: ''
            rust-targets: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm install

      - name: Ensure an app icon exists, then generate the icon set
        shell: bash
        run: |
          if [ ! -f app-icon.png ]; then node scripts/make-placeholder-icon.mjs; fi
          npm run tauri -- icon app-icon.png

      - name: Bake the default URL into the launcher
        if: ${{ github.event.inputs.default_url != '' }}
        shell: bash
        run: node scripts/set-default-url.mjs "${{ github.event.inputs.default_url }}"

      - name: Build + publish installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── macOS code-signing + notarization (optional) ──────────────────
          # Set these 6 repo secrets and the downloaded mac app opens with NO
          # Gatekeeper warning ("just works"). Leave them unset and the build is
          # unsigned (runs fine when built locally; downloads need a one-time
          # approval). See SIGNING.md for how to obtain each value.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          args: ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }}
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('app-build-{0}', github.run_number) }}
          releaseName: ${{ github.ref_type == 'tag' && github.ref_name || format('RAIN Desktop build {0}', github.run_number) }}
          releaseDraft: true
          releasePrerelease: false
