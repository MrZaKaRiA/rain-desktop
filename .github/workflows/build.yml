name: build

# Two ways to build all three OSes:
#   • Actions tab → "build" → Run workflow → (optionally) type your default URL.
#   • Push a tag like v0.1.0  →  builds + attaches installers to a draft release.
on:
  workflow_dispatch:
    inputs:
      default_url:
        description: 'Default URL to bake into the launcher (optional, e.g. https://admin.mystore.com)'
        required: false
        default: ''
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — dedicated per-architecture builds (native runners).
          - platform: macos-latest        # Apple Silicon (arm64)
            target: aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin
          - platform: macos-13            # Intel (x86_64)
            target: x86_64-apple-darwin
            rust-targets: x86_64-apple-darwin
          # Windows — x64 (native) and ARM64 (cross-compiled, best-effort).
          - platform: windows-latest
            target: ''
            rust-targets: ''
          - platform: windows-latest
            target: aarch64-pc-windows-msvc
            rust-targets: aarch64-pc-windows-msvc
          # Linux — x64 (native) and ARM64 (native ARM runner).
          - platform: ubuntu-22.04
            target: ''
            rust-targets: ''
          - platform: ubuntu-22.04-arm
            target: ''
            rust-targets: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm install

      - name: Ensure an app icon exists, then generate the icon set
        shell: bash
        run: |
          if [ ! -f app-icon.png ]; then node scripts/make-placeholder-icon.mjs; fi
          npm run tauri -- icon app-icon.png

      - name: Bake the default URL into the launcher
        if: ${{ github.event.inputs.default_url != '' }}
        shell: bash
        run: node scripts/set-default-url.mjs "${{ github.event.inputs.default_url }}"

      # macOS code-signing + notarization is opt-in and NOT wired here on
      # purpose: passing empty APPLE_* env vars makes Tauri attempt to codesign
      # with an empty identity and fails the whole mac build. To enable signed,
      # notarized mac builds, add the secrets and the dedicated step shown in
      # SIGNING.md (it exports the env only when the cert is actually present).
      - name: Build + publish installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }}
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('app-build-{0}', github.run_number) }}
          releaseName: ${{ github.ref_type == 'tag' && github.ref_name || format('RAIN Desktop build {0}', github.run_number) }}
          releaseDraft: true
          releasePrerelease: false

  # After every architecture has uploaded, give the installers strict,
  # unambiguous names (RAIN-Desktop-macOS-Apple-Silicon.dmg, …-Windows-ARM64.msi, …).
  finalize:
    name: Name assets
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Rename release assets to strict names
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || format('app-build-{0}', github.run_number) }}
          RELEASE_NAME: ${{ github.ref_type == 'tag' && github.ref_name || format('RAIN Desktop build {0}', github.run_number) }}
        run: node scripts/rename-assets.mjs
