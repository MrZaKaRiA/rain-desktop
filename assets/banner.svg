<svg width="1280" height="440" viewBox="0 0 1280 440" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#242424"/>
      <stop offset="0.55" stop-color="#141414"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="halo" cx="1050" cy="200" r="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="drop" x1="1050" y1="120" x2="1050" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dedad3"/>
    </linearGradient>
    <linearGradient id="rain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="440" fill="url(#bg)"/>
  <rect width="1280" height="440" fill="url(#halo)"/>

  <!-- ambient rain -->
  <g stroke="url(#rain)" stroke-linecap="round" opacity="0.5">
    <line x1="180" y1="40" x2="150" y2="150" stroke-width="3"/>
    <line x1="320" y1="-10" x2="288" y2="120" stroke-width="3"/>
    <line x1="520" y1="300" x2="498" y2="392" stroke-width="3"/>
    <line x1="760" y1="350" x2="740" y2="430" stroke-width="3"/>
    <line x1="980" y1="320" x2="958" y2="412" stroke-width="3"/>
    <line x1="1180" y1="60" x2="1156" y2="160" stroke-width="3"/>
  </g>

  <!-- wordmark -->
  <text x="108" y="150" fill="#9a9a9a" font-size="20" font-weight="600" letter-spacing="6">NATIVE DESKTOP  ·  MAC  ·  WINDOWS  ·  LINUX</text>
  <text x="104" y="278" fill="#ffffff" font-size="150" font-weight="800" letter-spacing="2">RAIN</text>
  <text x="108" y="344" fill="#cfccc6" font-size="29" font-weight="500">The storefront, the admin, the checkout —</text>
  <text x="108" y="384" fill="#cfccc6" font-size="29" font-weight="500">your whole store, in one beautiful place.</text>

  <!-- brand mark tile -->
  <g transform="translate(948, 96)">
    <rect width="208" height="208" rx="48" fill="#111111" stroke="#2e2e2e" stroke-width="1.5"/>
    <g stroke="#ffffff" stroke-linecap="round" fill="none">
      <line x1="72" y1="48" x2="64" y2="78" stroke-width="9" opacity="0.5"/>
      <line x1="104" y1="38" x2="95" y2="74" stroke-width="11" opacity="0.85"/>
      <line x1="138" y1="50" x2="130" y2="80" stroke-width="9" opacity="0.5"/>
    </g>
    <path d="M 104 92 C 112 102, 140 116, 140 140 A 36 36 0 1 1 68 140 C 68 116, 96 102, 104 92 Z" fill="url(#drop)"/>
    <ellipse cx="90" cy="138" rx="10" ry="16" fill="#ffffff" opacity="0.55"/>
  </g>
</svg>
