<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep premium charcoal tile (brand ink, not pure black so it reads on dark wallpapers) -->
    <linearGradient id="tile" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2c2c2c"/>
      <stop offset="0.55" stop-color="#161616"/>
      <stop offset="1" stop-color="#080808"/>
    </linearGradient>
    <!-- Soft top glow for depth -->
    <radialGradient id="glow" cx="512" cy="300" r="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.6" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Droplet dimension: bright top to warm shadow -->
    <linearGradient id="drop" x1="512" y1="430" x2="512" y2="730" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dedad3"/>
    </linearGradient>
    <linearGradient id="streak" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.35" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed square; Tauri applies the macOS squircle mask per platform -->
  <rect width="1024" height="1024" fill="url(#tile)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>
  <!-- Subtle inner top edge highlight -->
  <rect x="0" y="0" width="1024" height="3" fill="#ffffff" opacity="0.08"/>

  <!-- Rain streaks falling toward the droplet -->
  <g stroke="url(#streak)" stroke-linecap="round" fill="none">
    <line x1="372" y1="300" x2="340" y2="408" stroke-width="34" opacity="0.55"/>
    <line x1="512" y1="248" x2="478" y2="372" stroke-width="40" opacity="0.85"/>
    <line x1="652" y1="312" x2="620" y2="420" stroke-width="34" opacity="0.55"/>
  </g>

  <!-- Hero droplet (the RAIN mark) -->
  <path d="M 512 430
           C 540 472, 632 524, 632 606
           A 120 120 0 1 1 392 606
           C 392 524, 484 472, 512 430 Z"
        fill="url(#drop)"/>
  <!-- Specular highlight for a glossy, premium read -->
  <ellipse cx="468" cy="576" rx="34" ry="52" fill="#ffffff" opacity="0.55"/>
</svg>
