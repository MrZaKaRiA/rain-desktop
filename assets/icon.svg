<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" font-family="'Arial Black', 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2c2c2c"/>
      <stop offset="0.55" stop-color="#161616"/>
      <stop offset="1" stop-color="#080808"/>
    </linearGradient>
    <radialGradient id="glow" cx="512" cy="300" r="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.6" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="drop" x1="512" y1="286" x2="512" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dedad3"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed square; Tauri applies the macOS squircle mask per platform -->
  <rect width="1024" height="1024" fill="url(#tile)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>
  <rect x="0" y="0" width="1024" height="3" fill="#ffffff" opacity="0.08"/>

  <!-- Brand droplet accent above the wordmark -->
  <path d="M 512 286
           C 525 308, 566 332, 566 368
           A 54 54 0 1 1 458 368
           C 458 332, 499 308, 512 286 Z"
        fill="url(#drop)"/>
  <ellipse cx="491" cy="378" rx="15" ry="23" fill="#ffffff" opacity="0.55"/>

  <!-- RAIN wordmark -->
  <text x="516" y="690" text-anchor="middle" font-weight="900" font-size="248"
        letter-spacing="4" fill="#ffffff">RAIN</text>
</svg>
