<svg width="1280" height="600" viewBox="0 0 1280 600" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f6f4f0"/>
      <stop offset="1" stop-color="#eceae5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#1a1a1a" flood-opacity="0.16"/>
    </filter>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f1f1f"/>
      <stop offset="1" stop-color="#3a3a3a"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="600" fill="url(#page)"/>

  <!-- ── Launcher window ───────────────────────────── -->
  <g filter="url(#shadow)">
    <rect x="96" y="96" width="452" height="408" rx="20" fill="#ffffff"/>
  </g>
  <rect x="96" y="96" width="452" height="56" rx="20" fill="#fbfaf8"/>
  <rect x="96" y="138" width="452" height="14" fill="#fbfaf8"/>
  <circle cx="128" cy="124" r="6" fill="#e0ddd8"/>
  <circle cx="150" cy="124" r="6" fill="#e0ddd8"/>
  <circle cx="172" cy="124" r="6" fill="#e0ddd8"/>
  <text x="322" y="129" text-anchor="middle" fill="#9a9a9a" font-size="14" font-weight="600">RAIN Desktop</text>

  <!-- mini brand mark -->
  <g transform="translate(298, 178)">
    <rect width="48" height="48" rx="12" fill="#161616"/>
    <path d="M 24 16 C 27 20, 35 24, 35 32 A 11 11 0 1 1 13 32 C 13 24, 21 20, 24 16 Z" fill="#f4f2ee"/>
  </g>
  <text x="322" y="258" text-anchor="middle" fill="#1a1a1a" font-size="19" font-weight="700">Open your store</text>

  <text x="128" y="300" fill="#6b6b6b" font-size="13" font-weight="600">SITE URL</text>
  <rect x="128" y="312" width="388" height="46" rx="10" fill="#ffffff" stroke="#d8d5cf" stroke-width="1.5"/>
  <text x="146" y="340" fill="#3a3a3a" font-size="15">https://shop.mystore.com</text>

  <rect x="128" y="374" width="388" height="42" rx="10" fill="#faf9f7" stroke="#eceae5" stroke-width="1.5"/>
  <text x="146" y="400" fill="#8a8a8a" font-size="13.5">▸  Optional: pre-fill username + password</text>

  <rect x="128" y="430" width="388" height="50" rx="11" fill="#161616"/>
  <text x="322" y="461" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">Open site</text>

  <!-- ── Arrow ───────────────────────────── -->
  <g transform="translate(596, 280)">
    <text x="44" y="-14" text-anchor="middle" fill="#6b6b6b" font-size="14" font-weight="700" letter-spacing="1">OPENS</text>
    <line x1="0" y1="20" x2="74" y2="20" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
    <path d="M 70 8 L 88 20 L 70 32 Z" fill="#1a1a1a"/>
  </g>

  <!-- ── Native store window ───────────────────────────── -->
  <g filter="url(#shadow)">
    <rect x="732" y="96" width="452" height="408" rx="20" fill="#ffffff"/>
  </g>
  <rect x="732" y="96" width="452" height="56" rx="20" fill="#fbfaf8"/>
  <rect x="732" y="138" width="452" height="14" fill="#fbfaf8"/>
  <circle cx="764" cy="124" r="6" fill="#e0ddd8"/>
  <circle cx="786" cy="124" r="6" fill="#e0ddd8"/>
  <circle cx="808" cy="124" r="6" fill="#e0ddd8"/>
  <rect x="852" y="112" width="280" height="24" rx="12" fill="#f1efea"/>
  <text x="992" y="129" text-anchor="middle" fill="#8a8a8a" font-size="12.5">🔒  shop.mystore.com</text>

  <!-- storefront hero -->
  <rect x="756" y="172" width="404" height="120" rx="12" fill="url(#hero)"/>
  <text x="784" y="222" fill="#ffffff" font-size="22" font-weight="800">Summer Collection</text>
  <text x="784" y="250" fill="#cfccc6" font-size="13">New arrivals · free shipping</text>
  <rect x="784" y="262" width="96" height="16" rx="8" fill="#ffffff" opacity="0.9"/>

  <!-- product grid -->
  <g>
    <rect x="756" y="308" width="124" height="148" rx="10" fill="#f3f1ec"/>
    <rect x="772" y="324" width="92" height="80" rx="6" fill="#e3e0da"/>
    <rect x="772" y="416" width="74" height="10" rx="5" fill="#cdc9c2"/>
    <rect x="772" y="432" width="44" height="10" rx="5" fill="#1a1a1a"/>

    <rect x="896" y="308" width="124" height="148" rx="10" fill="#f3f1ec"/>
    <rect x="912" y="324" width="92" height="80" rx="6" fill="#e3e0da"/>
    <rect x="912" y="416" width="74" height="10" rx="5" fill="#cdc9c2"/>
    <rect x="912" y="432" width="44" height="10" rx="5" fill="#1a1a1a"/>

    <rect x="1036" y="308" width="124" height="148" rx="10" fill="#f3f1ec"/>
    <rect x="1052" y="324" width="92" height="80" rx="6" fill="#e3e0da"/>
    <rect x="1052" y="416" width="74" height="10" rx="5" fill="#cdc9c2"/>
    <rect x="1052" y="432" width="44" height="10" rx="5" fill="#1a1a1a"/>
  </g>

  <!-- caption -->
  <text x="640" y="554" text-anchor="middle" fill="#6b6b6b" font-size="15.5" font-weight="500">You type a URL once. It opens your store in a clean, native window — you sign in there, 2FA and all.</text>
</svg>
