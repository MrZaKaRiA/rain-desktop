<svg width="1280" height="300" viewBox="0 0 1280 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1a1a1a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1280" height="300" fill="none"/>

  <!-- Card 1 — Storefront builder -->
  <g filter="url(#cardShadow)"><rect x="48" y="34" width="278" height="232" rx="18" fill="#ffffff"/></g>
  <rect x="76" y="62" width="56" height="56" rx="14" fill="#161616"/>
  <g transform="translate(90,76)" fill="#ffffff">
    <rect x="0" y="0" width="12" height="12" rx="2.5"/><rect x="16" y="0" width="12" height="12" rx="2.5"/>
    <rect x="0" y="16" width="28" height="12" rx="2.5"/>
  </g>
  <text x="76" y="160" fill="#1a1a1a" font-size="20" font-weight="800">Build it visually</text>
  <text x="76" y="192" fill="#6b6b6b" font-size="14.5">Drag-and-drop home builder</text>
  <text x="76" y="214" fill="#6b6b6b" font-size="14.5">with scheduling &amp; targeting.</text>

  <!-- Card 2 — Payments -->
  <g filter="url(#cardShadow)"><rect x="350" y="34" width="278" height="232" rx="18" fill="#ffffff"/></g>
  <rect x="378" y="62" width="56" height="56" rx="14" fill="#161616"/>
  <g transform="translate(392,80)" fill="none" stroke="#ffffff" stroke-width="3">
    <rect x="0" y="0" width="28" height="20" rx="3.5" fill="#ffffff" stroke="none"/>
    <rect x="0" y="6" width="28" height="4" fill="#161616" stroke="none"/>
  </g>
  <text x="378" y="160" fill="#1a1a1a" font-size="20" font-weight="800">Get paid, locally</text>
  <text x="378" y="192" fill="#6b6b6b" font-size="14.5">Multi-gateway checkout,</text>
  <text x="378" y="214" fill="#6b6b6b" font-size="14.5">multi-currency &amp; tax built in.</text>

  <!-- Card 3 — PWA / mobile -->
  <g filter="url(#cardShadow)"><rect x="652" y="34" width="278" height="232" rx="18" fill="#ffffff"/></g>
  <rect x="680" y="62" width="56" height="56" rx="14" fill="#161616"/>
  <g transform="translate(698,74)">
    <rect x="0" y="0" width="20" height="32" rx="4" fill="#ffffff"/>
    <rect x="7" y="26" width="6" height="2.5" rx="1.25" fill="#161616"/>
  </g>
  <text x="680" y="160" fill="#1a1a1a" font-size="20" font-weight="800">Installs like an app</text>
  <text x="680" y="192" fill="#6b6b6b" font-size="14.5">Mobile-first &amp; PWA-ready —</text>
  <text x="680" y="214" fill="#6b6b6b" font-size="14.5">on the home screen in a tap.</text>

  <!-- Card 4 — Admin / analytics -->
  <g filter="url(#cardShadow)"><rect x="954" y="34" width="278" height="232" rx="18" fill="#ffffff"/></g>
  <rect x="982" y="62" width="56" height="56" rx="14" fill="#161616"/>
  <g transform="translate(996,78)" fill="#ffffff">
    <rect x="0" y="14" width="7" height="14" rx="1.5"/>
    <rect x="10" y="6" width="7" height="22" rx="1.5"/>
    <rect x="20" y="0" width="7" height="28" rx="1.5"/>
  </g>
  <text x="982" y="160" fill="#1a1a1a" font-size="20" font-weight="800">Run the business</text>
  <text x="982" y="192" fill="#6b6b6b" font-size="14.5">Orders, CRM, A/B tests &amp;</text>
  <text x="982" y="214" fill="#6b6b6b" font-size="14.5">analytics in one dashboard.</text>
</svg>
